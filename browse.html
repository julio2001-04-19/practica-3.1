<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Cyborg - Awesome HTML5 Template</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/fontawesome.css" />
  <link rel="stylesheet" href="assets/css/templatemo-cyborg-gaming.css" />
  <link rel="stylesheet" href="assets/css/owl.css" />
  <link rel="stylesheet" href="assets/css/animate.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
</head>

<body>

<header class="header-area header-sticky">
  <div class="container">
    <nav class="main-nav">
      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" style="width:60px;height:60px;border-radius:50%;" />
        <label style="margin-left:10px;">Julio Cesar Orduño Lopez</label>
      </a>
    </nav>
  </div>
</header>

<div class="container mt-5">
  <h4><em>Listado de</em> Tutoriales</h4>

  <table id="tutorialesTable" class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Título</th>
        <th>Categoría</th>
        <th>Calificación</th>
        <th>Descargas</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr />

  <div class="row">
    <div class="col-md-3"><input id="titulo" class="form-control" placeholder="Título"></div>
    <div class="col-md-3"><input id="categoria" class="form-control" placeholder="Categoría"></div>
    <div class="col-md-2"><input id="calificacion" type="number" class="form-control" placeholder="★"></div>
    <div class="col-md-2"><input id="descargas" class="form-control" placeholder="Descargas"></div>
    <div class="col-md-2"><button id="agregar" class="btn btn-success w-100">Agregar</button></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
const API_URL = "https://practica-3-1-j4qp.onrender.com";

$(document).ready(function () {

  $('#tutorialesTable').DataTable();

  function cargarTutoriales() {
    $.ajax({
      url: API_URL + "/tutoriales",
      method: "GET",
      success: function (data) {
        let tabla = $("#tutorialesTable tbody");
        tabla.empty();

        data.forEach((t, index) => {
          tabla.append(`
            <tr>
              <td>${t.titulo}</td>
              <td>${t.categoria}</td>
              <td>${t.calificacion}</td>
              <td>${t.descargas}</td>
              <td>
                <button class="btn btn-danger eliminar" data-id="${index}">Eliminar</button>
              </td>
            </tr>
          `);
        });
      }
    });
  }

  cargarTutoriales();

  // AGREGAR
  $('#agregar').click(function () {
    const nuevo = {
      titulo: $('#titulo').val(),
      categoria: $('#categoria').val(),
      calificacion: $('#calificacion').val(),
      descargas: $('#descargas').val()
    };

    $.ajax({
      url: API_URL + "/tutoriales",
      method: "POST",
      contentType: "application/json",
      data: JSON.stringify(nuevo),
      success: function () {
        alert("Agregado correctamente");
        cargarTutoriales();
      }
    });
  });

  // ELIMINAR
  $(document).on('click', '.eliminar', function () {
    const id = $(this).data('id');

    $.ajax({
      url: API_URL + "/tutoriales/" + id,
      method: "DELETE",
      success: function () {
        alert("Eliminado");
        cargarTutoriales();
      }
    });
  });

});
</script>

</body>
</html>
